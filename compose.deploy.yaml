name: archive-management-deploy

services:
    nginx:
        build:
            context: .
            target: web
        ports:
            - "${HTTP_PORT:-8080}:80"
        depends_on:
            server:
                condition: service_healthy
        restart: unless-stopped

    server:
        build:
            context: .
            target: server
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-archive_management}
            SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
            SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            ARCHIVE_AUTHENTICATION_BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-true}
            ARCHIVE_AUTHENTICATION_BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
            ARCHIVE_AUTHENTICATION_BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change-me-local-only}
        volumes:
            - server-data:/app/data
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
            interval: 10s
            timeout: 5s
            retries: 18
            start_period: 60s
        restart: unless-stopped

    postgres:
        image: postgres:18
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-archive_management}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        volumes:
            - postgres-data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s
        restart: unless-stopped

volumes:
    server-data:
    postgres-data:
