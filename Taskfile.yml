version: "3"

vars:
    FRONTEND_DIR: frontend
    SERVER_DIR: backend/archive-server
    PREVIEW_DIR: backend/preview-service
    COMPOSE_FILE: deploy/compose.dev.yaml
    JAVA: mise exec -- java
    PNPM: mise exec -- pnpm
    MVN: mise exec -- mvn
    GO: mise exec -- go

tasks:
    default:
        desc: 显示可用任务
        silent: true
        cmds:
            - task --list

    governance-check:
        desc: 检查 OpenSpec 与项目规范治理状态
        cmds:
            - openspec validate --all --strict --no-interactive
            - prove -v tooling/scripts/governance-check.t
            - perl tooling/scripts/governance-check.pl

    infra-up:
        desc: 启动本地 PostgreSQL 和 RustFS 并初始化开发 bucket
        silent: true
        cmds:
            - docker compose -f "{{.COMPOSE_FILE}}" up -d --wait
            - |
                bucket_url="http://localhost:${ARCHIVE_STORAGE_PORT:-9000}/${ARCHIVE_STORAGE_BUCKET:-archive}"
                sigv4="aws:amz:${ARCHIVE_STORAGE_REGION:-us-east-1}:s3"
                credentials="${ARCHIVE_STORAGE_ACCESS_KEY:-rustfsadmin}:${ARCHIVE_STORAGE_SECRET_KEY:-rustfsadmin}"
                if curl --fail --silent --head \
                    --aws-sigv4 "$sigv4" \
                    --user "$credentials" \
                    "$bucket_url" >/dev/null; then
                    echo "开发 bucket 已存在：${ARCHIVE_STORAGE_BUCKET:-archive}"
                else
                    curl --fail --silent --show-error \
                        --request PUT \
                        --aws-sigv4 "$sigv4" \
                        --user "$credentials" \
                        "$bucket_url"
                    echo "开发 bucket 已创建：${ARCHIVE_STORAGE_BUCKET:-archive}"
                fi

    infra-down:
        desc: 停止本地 PostgreSQL 和 RustFS
        silent: true
        cmds:
            - docker compose -f "{{.COMPOSE_FILE}}" down

    frontend-install:
        desc: 安装前端依赖
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} install"

    frontend-check:
        desc: 检查全部前端包
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} run check"

    frontend-check-fix:
        desc: 自动修复全部前端包 lint 问题
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} run check:fix"

    frontend-deprecated-check:
        desc: 检查前端过时 API 使用
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} --filter @archive-management/frontend-core run check:deprecated"
            - "{{.PNPM}} --filter @archive-management/web run check:deprecated"

    frontend-test:
        desc: 测试全部前端包
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} run test"

    frontend-build:
        desc: 构建全部前端包
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} run build"

    frontend-ready:
        desc: 前端检查、测试并构建
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} run ready"

    web-check:
        desc: 检查 PC 前端
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} --filter @archive-management/web run check"

    web-test:
        desc: 测试 PC 前端
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} --filter @archive-management/web run test"

    web-build:
        desc: 构建 PC 前端
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} --filter @archive-management/web run build"

    web-dev:
        desc: 启动 PC 前端开发服务
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} run dev:web"

    frontend-core-check:
        desc: 检查前端共享包
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} --filter @archive-management/frontend-core run check"

    frontend-core-test:
        desc: 测试前端共享包
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} --filter @archive-management/frontend-core run test"

    frontend-core-build:
        desc: 构建前端共享包
        dir: "{{.FRONTEND_DIR}}"
        cmds:
            - "{{.PNPM}} --filter @archive-management/frontend-core run build"

    server-java:
        desc: 打印 Java/Maven 版本
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.JAVA}} -version"
            - "{{.MVN}} -version"

    server-deps:
        desc: 下载 Maven 依赖
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.MVN}} -q dependency:resolve"

    server-format-check:
        desc: 检查 server 格式
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.MVN}} spotless:check"

    server-format:
        desc: 自动格式化 server
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.MVN}} spotless:apply"

    server-deprecated-check:
        desc: 检查 server 过时 API 使用
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.MVN}} -Drewrite.activeRecipes=org.openrewrite.java.search.FindDeprecatedUses -Drewrite.exportDatatables=true rewrite:dryRun"

    server-rewrite-dry-run:
        desc: 预览 server OpenRewrite 迁移
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.MVN}} rewrite:dryRun"

    server-rewrite-run:
        desc: 执行 server OpenRewrite 迁移
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.MVN}} rewrite:run"

    server-compile:
        desc: 编译 server
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.MVN}} compile"

    server-test:
        desc: 测试 server
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.MVN}} test"

    server-package:
        desc: 打包 server
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.MVN}} package"

    server-run:
        desc: 启动 server
        dir: "{{.SERVER_DIR}}"
        cmds:
            - "{{.MVN}} spring-boot:run"

    preview-test:
        desc: 测试文件预览服务
        dir: "{{.PREVIEW_DIR}}"
        cmds:
            - "{{.GO}} test ./..."

    preview-build:
        desc: 构建文件预览服务
        dir: "{{.PREVIEW_DIR}}"
        cmds:
            - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force build | Out-Null"
              platforms: [windows]
            - cmd: mkdir -p build
              platforms: [linux, darwin]
            - "{{.GO}} build -o build/preview-service ./cmd/preview-service"

    preview-run:
        desc: 启动文件预览服务
        dir: "{{.PREVIEW_DIR}}"
        cmds:
            - "{{.GO}} run ./cmd/preview-service"
