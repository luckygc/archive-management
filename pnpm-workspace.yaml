packages:
    - "web"
    - "mobile"
    - "frontend-core"

catalogMode: prefer

overrides:
    vite: "npm:@voidzero-dev/vite-plus-core@latest"

peerDependencyRules:
    allowAny:
        - vite
        - vitest
    allowedVersions:
        vite: "*"
        vitest: "*"

allowBuilds:
    "@parcel/watcher": true

catalog:
    "@ant-design/cli": ^6.5.0
    "@ant-design/icons": ^6.2.5
    "@ant-design/pro-components": 3.1.12-0
    "@cap.js/wasm": ^0.0.7
    "@tanstack/react-query": ^5.101.1
    "@testing-library/jest-dom": ^6.9.1
    "@testing-library/react": ^16.3.2
    "@types/react": ^19.2.17
    "@types/react-dom": ^19.2.3
    "@vitejs/plugin-react": ^6.0.3
    antd: ^6.4.5
    antd-mobile: ^5.42.0
    axios: ^1.18.1
    cap-widget: ^0.1.56
    dayjs: ^1.11.19
    jsdom: ^29.1.1
    keepalive-for-react: ^5.0.11
    keepalive-for-react-router: ^5.0.7
    react: ^19.2.7
    react-dom: ^19.2.7
    react-router: ^8.0.1
    vite: ^8.0.16
    vite-plus: ^0.2.1
    vitest: ^4.1.9
    zod: ^4.4.3
    zustand: ^5.0.14

minimumReleaseAgeExclude:
    - "@ant-design/cli@6.5.0"

patchedDependencies:
    cap-widget@0.1.56: patches/cap-widget@0.1.56.patch
