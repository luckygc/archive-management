spring:
  application:
    name: archive-management
  security:
    user:
      name: ${SECURITY_USER_NAME:admin}
      password: ${SECURITY_USER_PASSWORD:admin}
      roles:
        - USER
        - ACTUATOR
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5433/archive_management}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    hikari:
      pool-name: archive-management-hikari
      minimum-idle: 5
      maximum-pool-size: 30
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true
  session:
    timeout: 30m
    jdbc:
      initialize-schema: never
      table-name: SPRING_SESSION
  quartz:
    job-store-type: memory
    auto-startup: true
    startup-delay: 0s
    wait-for-jobs-to-complete-on-shutdown: true
    overwrite-existing-jobs: false
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.scheduler.instanceName: archiveManagementScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.threadPool.threadCount: 10
      org.quartz.threadPool.threadPriority: 5
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        model: deepseek-chat
        temperature: 0.7
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: github.luckygc.am
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    return-instance-for-empty-row: true
    jdbc-type-for-null: "NULL"

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

log:
  dir: ${LOG_DIR:logs}
  max-file-size: ${LOG_MAX_FILE_SIZE:20MB}
  max-history: ${LOG_MAX_HISTORY:30}
  total-size-cap: ${LOG_TOTAL_SIZE_CAP:5GB}
  immediate-flush: ${LOG_IMMEDIATE_FLUSH:true}
  root-level: ${LOG_ROOT_LEVEL:INFO}
  app-level: ${LOG_APP_LEVEL:DEBUG}

archive:
  storage:
    # 上传策略：对象存储配置完整时优先对象存储，否则使用 active-local-bucket 指定的本地 bucket。
    active-local-bucket: local
    local:
      - bucket: local
        root: ${ARCHIVE_STORAGE_LOCAL_ROOT:data/files}
      - bucket: nas
        root: ${ARCHIVE_STORAGE_NAS_ROOT:/home/gc/archive-files}
    object:
      # 支持 AWS S3、MinIO、腾讯 COS、阿里云 OSS、华为云 OBS 等 S3 兼容对象存储。
      endpoint: ${ARCHIVE_STORAGE_OBJECT_ENDPOINT:}
      region: ${ARCHIVE_STORAGE_OBJECT_REGION:us-east-1}
      bucket: ${ARCHIVE_STORAGE_OBJECT_BUCKET:}
      access-key: ${ARCHIVE_STORAGE_OBJECT_ACCESS_KEY:}
      secret-key: ${ARCHIVE_STORAGE_OBJECT_SECRET_KEY:}
      path-style-access: ${ARCHIVE_STORAGE_OBJECT_PATH_STYLE_ACCESS:true}
