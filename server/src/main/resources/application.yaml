spring:
    application:
        # 应用名称，也会作为默认日志文件名前缀。
        name: archive-management
    datasource:
        # 业务数据库连接地址。
        url: jdbc:postgresql://localhost:5433/archive_management
        # PostgreSQL JDBC 驱动类。
        driver-class-name: org.postgresql.Driver
        # 业务数据库用户名。
        username: postgres
        # 业务数据库密码，空值表示本地免密或通过其他机制认证。
        password:
        hikari:
            # Hikari 连接池名称，便于日志和监控识别。
            pool-name: archive-management-hikari
            # 连接池最小空闲连接数。
            minimum-idle: 5
            # 连接池最大连接数。
            maximum-pool-size: 30
            # 空闲连接保留时间，单位毫秒。
            idle-timeout: 600000
            # 单个连接最长生命周期，单位毫秒。
            max-lifetime: 1800000
            # 获取连接的最长等待时间，单位毫秒。
            connection-timeout: 30000
    flyway:
        # 是否启用 Flyway 数据库迁移。
        enabled: true
        # Flyway 迁移脚本位置。默认只执行结构迁移。
        # 本地加载示例数据可设置：
        # AM_FLYWAY_LOCATIONS=classpath:db/migration,classpath:db/sample
        locations: ${AM_FLYWAY_LOCATIONS:classpath:db/migration}
        # 非空库首次接入迁移时是否自动建立基线。
        baseline-on-migrate: true
        # Flyway 基线版本。
        baseline-version: 0
        # 启动迁移前是否校验已执行脚本。
        validate-on-migrate: ${AM_FLYWAY_VALIDATE_ON_MIGRATE:true}
        # 禁用 clean，避免误删库表；本地重置时可临时设置 AM_FLYWAY_CLEAN_DISABLED=false。
        clean-disabled: ${AM_FLYWAY_CLEAN_DISABLED:true}
    session:
        # HTTP Session 过期时间。
        timeout: 30m
        jdbc:
            # Spring Session 表由 Flyway 管理，不由框架自动初始化。
            initialize-schema: never
            # Spring Session 主表名称。
            table-name: SPRING_SESSION
    quartz:
        # Quartz 存储类型，memory 适合本地开发；部署可改为 jdbc。
        job-store-type: jdbc
        # 应用启动后是否自动启动 Quartz 调度器。
        auto-startup: true
        # Quartz 调度器启动延迟。
        startup-delay: 0s
        # 应用关闭时是否等待正在执行的任务完成。
        wait-for-jobs-to-complete-on-shutdown: true
        # 启动时是否覆盖已存在的 Quartz Job 定义。
        overwrite-existing-jobs: true
        jdbc:
            # Quartz 表由 Flyway 管理，不由框架自动初始化。
            initialize-schema: never
        properties:
            # Quartz 调度器名称。
            org.quartz.scheduler.instanceName: archiveManagementScheduler
            # Quartz 实例 ID，AUTO 由 Quartz 自动生成。
            org.quartz.scheduler.instanceId: AUTO
            # Quartz 工作线程数量。
            org.quartz.threadPool.threadCount: 16
            # Quartz 工作线程优先级。
            org.quartz.threadPool.threadPriority: 5
    ai:
        deepseek:
            # DeepSeek API Key，唯一保留环境变量占位的敏感配置。
            api-key: ${DEEPSEEK_API_KEY:}
            # DeepSeek API 基础地址。
            base-url: https://api.deepseek.com
            chat:
                # DeepSeek 聊天模型名称。
                model: deepseek-chat
                # 模型输出随机性，值越高越发散。
                temperature: 0.7
    servlet:
        multipart:
            # 是否启用 multipart 文件上传。
            enabled: true
            # 单个上传文件大小上限。
            max-file-size: 50MB
            # 单次上传请求总大小上限。
            max-request-size: 100MB
    jackson:
        # JSON 序列化和反序列化使用的默认时区。
        time-zone: Asia/Shanghai
        # Date 类型默认格式。
        date-format: yyyy-MM-dd HH:mm:ss
        # JSON 输出时不包含 null 字段。
        default-property-inclusion: always

server:
    # HTTP 服务端口。
    port: 8080
    servlet:
        # 应用上下文路径。
        context-path: /
        session:
            cookie:
                name: am_session
    compression:
        # 是否启用 HTTP 响应压缩。
        enabled: true

mybatis:
    # MyBatis Mapper XML 扫描位置。
    mapper-locations: classpath*:mapper/**/*.xml
    # MyBatis 类型别名扫描包。
    type-aliases-package: github.luckygc.am
    configuration:
        # 开启下划线字段到驼峰属性的自动映射。
        map-underscore-to-camel-case: true
        # 关闭 MyBatis 二级缓存。
        cache-enabled: false
        # 查询结果字段为 null 时仍调用 setter。
        call-setters-on-nulls: true
        # 查询结果全空时仍返回对象实例。
        return-instance-for-empty-row: true
        # null 参数默认 JDBC 类型。
        jdbc-type-for-null: "NULL"

management:
    endpoints:
        web:
            # Actuator Web 端点基础路径。
            base-path: /actuator
            exposure:
                # 暴露的 Actuator 端点，开发期默认全部暴露。
                include: "*"
    endpoint:
        health:
            # health 端点是否展示详细信息。
            show-details: always
    health:
        db:
            # 是否启用数据库健康检查。
            enabled: true
        diskspace:
            # 是否启用磁盘空间健康检查。
            enabled: true

logging:
    file:
        # 日志输出目录。
        path: logs
    level:
        # 根日志级别。
        root: INFO

archive:
    flyway:
        # 启动迁移前是否先执行 Flyway clean。仅允许本地重建或演示环境临时开启。
        clean-before-migrate: ${AM_FLYWAY_CLEAN_BEFORE_MIGRATE:false}
    auth:
        bootstrap-admin:
            # 是否在启动时初始化管理员账号；仅在本地初始化或部署初始化时显式开启。
            enabled: ${AM_BOOTSTRAP_ADMIN_ENABLED:false}
            # 初始化管理员账号。
            username: ${AM_BOOTSTRAP_ADMIN_USERNAME:admin}
            # 初始化管理员密码，开启初始化时必须通过环境变量提供。
            password: ${AM_BOOTSTRAP_ADMIN_PASSWORD:}
            # 初始化管理员显示名称。
            display-name: ${AM_BOOTSTRAP_ADMIN_DISPLAY_NAME:系统管理员}
    security:
        cors:
            # 允许本地 Vite 前端跨域携带凭证访问后端；部署时改为实际可信前端 Origin。
            allowed-origins:
                - http://localhost:5173
                - http://127.0.0.1:5173
            allowed-origin-patterns: []
            allowed-methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
            allowed-headers:
                - Content-Type
                - X-XSRF-TOKEN
                - X-Trace-Id
            exposed-headers:
                - X-Trace-Id
            allow-credentials: true
            max-age: 3600
    storage:
        # 上传策略：对象存储配置完整时优先对象存储，否则使用 active-local-bucket 指定的本地 bucket。
        # 当前使用的本地存储 bucket。
        active-local-bucket: local
        # 本地文件存储 bucket 列表。
        local:
            # 本地 bucket。
            -   bucket: local
                # 本地 bucket 根目录。
                root: data/files
            # NAS 挂载 bucket。
            -   bucket: backup
                # NAS 挂载目录。
                root: /home/gc/archive-files
        object:
            # 支持 AWS S3、MinIO、腾讯 COS、阿里云 OSS、华为云 OBS 等 S3 兼容对象存储。
            # S3 兼容对象存储服务地址，留空表示不启用对象存储。
            endpoint:
            # S3 兼容对象存储区域。
            region: us-east-1
            # S3 兼容对象存储 bucket。
            bucket:
            # S3 兼容对象存储访问密钥 ID。
            access-key:
            # S3 兼容对象存储访问密钥。
            secret-key:
            # 是否使用 path-style 访问方式，MinIO 通常需要开启。
            path-style-access: true
