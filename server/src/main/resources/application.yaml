spring:
    application:
        # 应用名称，也会作为默认日志文件名前缀。
        name: archive-management
    config:
        # 本机差异配置放在 application-local.yaml，文件被 Git 忽略；导入值优先于本默认配置。
        import: optional:classpath:application-local.yaml
    cache:
        # 默认不启用业务缓存；需要本地简单缓存可改为 simple，Redis 缓存按 Spring Boot Cache 配置接入。
        type: none
    datasource:
        # 业务数据库连接地址。
        url: jdbc:postgresql://localhost:5433/archive_management
        # PostgreSQL JDBC 驱动类。
        driver-class-name: org.postgresql.Driver
        # 业务数据库用户名。
        username: postgres
        # 业务数据库密码，空值表示本地免密或通过其他机制认证。
        password:
        hikari:
            # Hikari 连接池名称，便于日志和监控识别。
            pool-name: archive-management-hikari
            # 连接池最小空闲连接数。
            minimum-idle: 5
            # 连接池最大连接数。
            maximum-pool-size: 30
            # 空闲连接保留时间，单位毫秒。
            idle-timeout: 600000
            # 单个连接最长生命周期，单位毫秒。
            max-lifetime: 1800000
            # 获取连接的最长等待时间，单位毫秒。
            connection-timeout: 30000
    flyway:
        # 是否启用 Flyway 数据库迁移。
        enabled: true
        # Flyway 迁移脚本位置。产品默认只执行结构迁移；本机差异通过 application-local.yaml 覆盖。
        locations:
            - classpath:db/migration
        # 非空库首次接入迁移时是否自动建立基线。
        baseline-on-migrate: true
        # Flyway 基线版本。
        baseline-version: 0
        # 启动迁移前是否校验已执行脚本。
        validate-on-migrate: true
        # 禁用 clean，避免误删库表；本地重置时通过外部配置覆盖。
        clean-disabled: true
    session:
        # HTTP Session 过期时间。
        timeout: 30m
        jdbc:
            # Spring Session 表由 Flyway 管理，不由框架自动初始化。
            initialize-schema: never
            # Spring Session 主表名称。
            table-name: SPRING_SESSION
    quartz:
        # Quartz 存储类型；当前使用 JDBC，由 Flyway 管理 QRTZ_* 表。
        job-store-type: jdbc
        # 应用启动后是否自动启动 Quartz 调度器。
        auto-startup: true
        # Quartz 调度器启动延迟。
        startup-delay: 0s
        # 应用关闭时是否等待正在执行的任务完成。
        wait-for-jobs-to-complete-on-shutdown: true
        # 启动时是否覆盖已存在的 Quartz Job 定义。
        overwrite-existing-jobs: true
        jdbc:
            # Quartz 表由 Flyway 管理，不由框架自动初始化。
            initialize-schema: never
        properties:
            # Quartz 调度器名称。
            org.quartz.scheduler.instanceName: archiveManagementScheduler
            # Quartz 实例 ID，AUTO 由 Quartz 自动生成。
            org.quartz.scheduler.instanceId: AUTO
            # Quartz 工作线程数量。
            org.quartz.threadPool.threadCount: 16
            # Quartz 工作线程优先级。
            org.quartz.threadPool.threadPriority: 5
    ai:
        deepseek:
            # DeepSeek API Key。产品默认不提交密钥，实际部署文件不要提交。
            api-key:
            # DeepSeek API 基础地址。
            base-url: https://api.deepseek.com
            chat:
                # DeepSeek 聊天模型名称。
                model: deepseek-chat
                # 模型输出随机性，值越高越发散。
                temperature: 0.7
    servlet:
        multipart:
            # 是否启用 multipart 文件上传。
            enabled: true
            # 单个上传文件大小上限。
            max-file-size: 50MB
            # 单次上传请求总大小上限。
            max-request-size: 100MB
    jackson:
        # JSON 序列化和反序列化使用的默认时区。
        time-zone: Asia/Shanghai
        # Date 类型默认格式。
        date-format: yyyy-MM-dd HH:mm:ss
        # JSON 输出时包含 null 字段。
        default-property-inclusion: always
    modulith:
        events:
            # 应用重启后重新发布未完成的模块事件，避免监听器失败或节点异常导致事件永久停留。
            republish-outstanding-events-on-restart: true
            externalization:
                # 当前阶段只接入模块事件注册表，不默认启用跨系统事件外发。
                enabled: false
            jdbc:
                schema-initialization:
                    # Spring Modulith 原生事件发布注册表表结构由框架初始化，不作为项目自有表维护。
                    enabled: true

cosid:
    # 启用 CosId，为高数据量档案记录和文件实体提供插入前 Long ID。
    enabled: true
    namespace: archive-management
    machine:
        # 机器号通过业务库 cosid_machine 表分配。
        enabled: true
        # 默认不使用本机持久化机器号状态，避免本地重建数据库后残留的 ~/.cosid-machine-state 与 cosid_machine 表不一致。
        stable: false
        machine-bit: 10
        instance-id: archive-management-8080
        distributor:
            type: jdbc
    snowflake:
        # 共享 Snowflake 生成器供 Hibernate 标识生成器使用。
        enabled: true
        share:
            enabled: true
            namespace: archive-management
            machine-bit: 10

server:
    # HTTP 服务端口。
    port: 8080
    servlet:
        # 应用上下文路径。
        context-path: /
        session:
            cookie:
                name: am_session
    compression:
        # 是否启用 HTTP 响应压缩。
        enabled: true

mybatis:
    # MyBatis Mapper XML 扫描位置。
    mapper-locations: classpath*:mapper/**/*.xml
    # MyBatis 类型别名扫描包。
    type-aliases-package: github.luckygc.am
    configuration:
        # 开启下划线字段到驼峰属性的自动映射。
        map-underscore-to-camel-case: true
        # 关闭 MyBatis 二级缓存。
        cache-enabled: false
        # 查询结果字段为 null 时仍调用 setter。
        call-setters-on-nulls: true
        # 查询结果全空时仍返回对象实例。
        return-instance-for-empty-row: true
        # null 参数默认 JDBC 类型。
        jdbc-type-for-null: "NULL"

flowable:
    # Flowable 使用当前应用 DataSource 和事务管理器；引入 process starter 后会启用 BPMN process engine。
    # 框架原生 ACT_* 表由 Flyway 迁移管理，运行期只校验表结构。
    database-schema-update: false
    # 流程引擎由 process starter 默认启用；IDM 与 Event Registry 不随应用启动。
    idm:
        enabled: false
    eventregistry:
        enabled: false
    # 审批流首版不依赖异步执行器，避免引入额外后台线程行为。
    async-executor-activate: false

management:
    endpoints:
        web:
            # Actuator Web 端点基础路径。
            base-path: /actuator
            exposure:
                # 暴露的 Actuator 端点，开发期默认全部暴露。
                include: "*"
    endpoint:
        health:
            # health 端点是否展示详细信息。
            show-details: always
    health:
        db:
            # 是否启用数据库健康检查。
            enabled: true
        diskspace:
            # 是否启用磁盘空间健康检查。
            enabled: true

logging:
    file:
        # 日志输出目录。
        path: logs
    level:
        # 根日志级别。
        root: INFO

archive:
    flyway:
        # 启动迁移前是否先执行 Flyway clean。仅允许本地重建或演示环境临时开启。
        clean-before-migrate: false
    auth:
        bootstrap-admin:
            # 是否在启动时初始化管理员账号；仅在本地初始化或部署初始化时显式开启。
            enabled: false
            # 初始化管理员账号。
            username: admin
            # 初始化管理员密码，开启初始化时必须通过外部配置提供。
            password:
            # 初始化管理员显示名称。
            display-name: 系统管理员
            # 初始化管理员默认授予的角色名称。
            role-names:
                - 系统管理员
                - 系统监控
    security:
        authorization:
            # 允许访问 Actuator 端点的角色名称。
            actuator-role-name: 系统监控
        request-signature:
            # 是否启用 /api/** 请求 HMAC 签名校验；开启后除 OPTIONS 预检外都必须携带签名头。
            enabled: false
            # HMAC-SHA256 密钥，开启签名校验时必须通过外部配置提供，长度至少 32 个字符。
            secret:
            # 允许客户端签名时间戳与服务端时间的最大偏移。
            clock-skew: 5m
        cors:
            # 允许本地 Vite 前端跨域携带凭证访问后端；部署时改为实际可信前端 Origin。
            allowed-origins:
                - http://localhost:5173
                - http://127.0.0.1:5173
            allowed-origin-patterns: []
            allowed-methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
            allowed-headers:
                - Content-Type
                - X-XSRF-TOKEN
                - X-Trace-Id
                - X-AM-Timestamp
                - X-AM-Nonce
                - X-AM-Signature
            exposed-headers:
                - X-Trace-Id
            allow-credentials: true
            max-age: 3600
    search:
        full-text:
            # 档案全文检索用于查档、借阅等普通用户业务入口，不作为管理列表筛选入口。
            # postgresql 使用 pg_trgm + GIN + ILIKE；也可配置后续注册的 opensearch、solr、meilisearch 等 provider。
            provider: postgresql
            # 全文检索索引名称，供具体 provider 使用。
            index-name: archive_records
            # 全文检索结果上限。
            result-limit: 1000
    storage:
        # 默认上传文件存储 adapter：local、s3、minio、cos、oss、obs。
        # 历史文件下载、删除和存在判断仍按文件记录中的 storage_type、bucket_name 路由。
        adapter: local
        # 当前默认 adapter 为 local 时使用的本地存储 bucket。
        active-local-bucket: local
        # 本地文件存储 bucket 列表。
        local:
            # 本地 bucket。
            - bucket: local
              # 本地 bucket 根目录。
              root: data/files
            # NAS 挂载 bucket。
            - bucket: backup
              # NAS 挂载目录。
              root: /home/gc/archive-files
        object:
            # 支持 AWS S3、MinIO、腾讯 COS、阿里云 OSS、华为云 OBS 等 S3 兼容对象存储。
            # S3 兼容对象存储服务地址，留空表示不启用对象存储。
            endpoint:
            # S3 兼容对象存储区域。
            region: us-east-1
            # S3 兼容对象存储 bucket。
            bucket:
            # S3 兼容对象存储访问密钥 ID。
            access-key:
            # S3 兼容对象存储访问密钥。
            secret-key:
            # 是否使用 path-style 访问方式，MinIO 通常需要开启。
            path-style-access: true
