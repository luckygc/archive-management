name: archive-management-dev

services:
    postgres:
        image: postgres:18
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-archive_management}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        ports:
            - "${POSTGRES_PORT:-5433}:5432"
        volumes:
            - postgres-data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s

volumes:
    postgres-data:
